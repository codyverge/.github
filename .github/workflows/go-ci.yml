name: go-ci

# Reusable CI for Go repos (e.g. alena-tui). Caller owns triggers + concurrency.
#
# Usage:
#   jobs:
#     ci:
#       uses: codyverge/.github/.github/workflows/go-ci.yml@main
#       with: { go-version: '1.23' }

on:
  workflow_call:
    inputs:
      go-version:
        type: string
        default: '1.23'

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ inputs.go-version }}
          cache: true
      - run: go vet ./...
      - run: go build ./...
      - run: go test -race -coverprofile=coverage.out ./...
